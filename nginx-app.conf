# Reference nginx config - copy to /etc/nginx/sites-available/myapp on EC2
# then symlink: sudo ln -s /etc/nginx/sites-available/myapp /etc/nginx/sites-enabled/
# and remove default: sudo rm /etc/nginx/sites-enabled/default
# then: sudo nginx -t && sudo systemctl restart nginx

server {
    listen 80;
    server_name _;

    location / {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}
